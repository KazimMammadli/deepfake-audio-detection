version: '3.8'

services:
  deepfake-detector:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models:ro  # Mount models as read-only
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
